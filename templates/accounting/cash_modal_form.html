<div class="modal-dialog modal-lg modal-dialog-scrollable" role="document">
    <div class="modal-content rv-modal rv-finance-modal">
        <div class="modal-header">
            <div class="rv-prog-modal-header-content">
                <div class="rv-prog-modal-icon" aria-hidden="true">
                    <i class="fas fa-cash-register"></i>
                </div>
                <div>
                    <h5 class="modal-title">Nueva caja</h5>
                    <p class="rv-modal-subtitle mb-0">Registre una caja para control de movimientos en {{ subsidiary_obj.name }}</p>
                </div>
            </div>
            <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <form id="cash-modal-form" method="POST">
            {% csrf_token %}
            <div class="modal-body">
                <div class="rv-modal-hint">
                    <i class="fas fa-info-circle"></i>
                    La caja quedará asociada a su sede. Los campos con <span class="rv-required-mark">*</span> son obligatorios.
                </div>

                <div class="rv-form-grid">
                    <div class="rv-form-group rv-form-group-required rv-form-group-full">
                        <label for="id-entity-name">Nombre de la caja</label>
                        <input type="text" class="rv-form-control text-uppercase" id="id-entity-name"
                               name="entity-name" placeholder="Ej. CAJA PRINCIPAL" required>
                    </div>
                    <div class="rv-form-group">
                        <label for="id-entity-subsidiary-name">Sede</label>
                        <input type="hidden" id="id-entity-subsidiary" name="entity-subsidiary" value="{{ subsidiary_obj.id }}">
                        <input type="text" class="rv-form-control" id="id-entity-subsidiary-name"
                               value="{{ subsidiary_obj.name }}" readonly>
                    </div>
                    <div class="rv-form-group rv-form-group-required">
                        <label for="id-entity-initial">Saldo inicial</label>
                        <input type="number" step="0.01" min="0" class="rv-form-control" id="id-entity-initial"
                               name="entity-initial" placeholder="0.00" required>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="rv-btn rv-btn-outline" data-dismiss="modal">Cancelar</button>
                <button type="submit" class="rv-btn rv-btn-success" id="btn-save-cash">
                    <i class="fas fa-save"></i> Registrar caja
                </button>
            </div>
        </form>
    </div>
</div>
