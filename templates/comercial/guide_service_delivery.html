<div class="rv-guide-service rv-guide-service-d">
    <div class="rv-guide-e-top rv-guide-e-top--balanced">
        <div class="rv-guide-card rv-guide-e-route">
            <div class="rv-guide-card-head"><i class="fas fa-map-marker-alt"></i><span>Punto origen A</span></div>
            <div class="rv-guide-s-route-fields">
                <div class="rv-form-group rv-form-group-required rv-guide-s-field-full">
                    <label for="d_origin_address">Dirección de recojo</label>
                    <div class="rv-e-input-wrap">
                        <i class="fas fa-location-arrow rv-e-input-icon"></i>
                        <input type="text" id="d_origin_address" class="rv-form-control rv-e-input-pad text-uppercase" placeholder="Dirección completa del punto A">
                    </div>
                </div>
            </div>
        </div>

        <div class="rv-guide-card rv-guide-e-route">
            <div class="rv-guide-card-head"><i class="fas fa-map-pin"></i><span>Punto destino B</span></div>
            <div class="rv-guide-s-route-fields">
                <div class="rv-form-group rv-form-group-required">
                    <label for="d_dest_client">Cliente</label>
                    <div class="rv-e-input-wrap">
                        <i class="fas fa-user rv-e-input-icon"></i>
                        <input type="text" id="d_dest_client" class="rv-form-control rv-e-input-pad text-uppercase">
                    </div>
                </div>
                <div class="rv-form-group rv-form-group-required">
                    <label for="d_dest_phone">Teléfono</label>
                    <div class="rv-e-input-wrap">
                        <i class="fas fa-phone rv-e-input-icon"></i>
                        <input type="text" id="d_dest_phone" class="rv-form-control rv-e-input-pad" maxlength="9">
                    </div>
                </div>
                <div class="rv-form-group rv-form-group-required rv-guide-s-field-full">
                    <label for="d_dest_address">Dirección de entrega</label>
                    <input type="text" id="d_dest_address" class="rv-form-control text-uppercase">
                </div>
                <div class="rv-form-group rv-guide-s-field-full">
                    <label for="d_dest_reference">Referencia</label>
                    <input type="text" id="d_dest_reference" class="rv-form-control text-uppercase" placeholder="Edificio, piso, timbre...">
                </div>
            </div>
        </div>
    </div>

    <div class="rv-guide-card rv-guide-card-full rv-guide-e-detail">
        <div class="rv-guide-card-head">
            <span><i class="fas fa-box"></i> Detalle del envío</span>
            <span class="rv-guide-e-detail-count" id="d_detail_count">0 ítems</span>
        </div>

        <div class="rv-guide-e-detail-compose rv-guide-e-detail-compose--3">
            <div class="rv-form-group rv-guide-e-detail-desc">
                <label for="d_item_desc">Descripción</label>
                <div class="rv-e-input-wrap">
                    <i class="fas fa-tag rv-e-input-icon"></i>
                    <input type="text" id="d_item_desc" class="rv-form-control rv-e-input-pad text-uppercase" placeholder="Ej. PAQUETE, DOCUMENTOS">
                </div>
            </div>
            <div class="rv-form-group rv-guide-e-detail-price">
                <label for="d_item_price">Precio (S/)</label>
                <div class="rv-e-input-wrap">
                    <span class="rv-e-input-prefix">S/</span>
                    <input type="number" id="d_item_price" class="rv-form-control rv-e-input-prefix-pad" min="0" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="rv-form-group rv-guide-e-detail-add">
                <label>&nbsp;</label>
                <button type="button" class="rv-btn rv-btn-success" id="d_add_item">
                    <i class="fas fa-plus"></i> Agregar
                </button>
            </div>
        </div>

        <div class="rv-guide-e-detail-body">
            <div class="rv-guide-e-detail-list-head rv-guide-e-detail-list-head--3">
                <span>Descripción</span>
                <span class="text-right">Precio</span>
                <span></span>
            </div>
            <div class="rv-guide-e-detail-list" id="d_shipment_body"></div>
            <div class="rv-guide-e-detail-empty" id="d_shipment_empty">
                <i class="fas fa-shipping-fast"></i>
                <p>Agregue los ítems del envío</p>
            </div>
        </div>

        <div class="rv-guide-e-detail-summary">
            <div class="rv-guide-e-summary-item">
                <span>Subtotal envío</span>
                <strong>S/ <span class="d-shipment-total">0.00</span></strong>
            </div>
            <div class="rv-guide-e-summary-item rv-guide-e-summary-total">
                <span>Tarifa total</span>
                <strong>S/ <span id="d_fare_display">0.00</span></strong>
            </div>
        </div>
    </div>

    <div class="rv-guide-card rv-guide-e-doc">
        <div class="rv-guide-card-head"><i class="fas fa-credit-card"></i><span>Pago</span></div>
        <div class="rv-guide-e-doc-fields">
            <div class="rv-form-group rv-form-group-required">
                <label for="d_fare_amount">Tarifa (S/)</label>
                <div class="rv-e-input-wrap">
                    <span class="rv-e-input-prefix">S/</span>
                    <input type="number" id="d_fare_amount" class="rv-form-control rv-e-input-prefix-pad" min="0.01" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="rv-form-group rv-form-group-required">
                <label for="d_payment_method">Método de pago</label>
                <select id="d_payment_method" class="rv-form-control">
                    <option value="E">Efectivo</option>
                    <option value="T">Tarjeta</option>
                </select>
            </div>
        </div>
    </div>

    <div class="rv-guide-e-footer rv-guide-service-footer">
        <div class="rv-guide-e-footer-left rv-guide-service-footer-left">
            <button type="button" class="rv-btn rv-btn-outline rv-guide-e-btn-clear" id="d_btn_clear">
                <i class="fas fa-eraser"></i> Limpiar
            </button>
            <button type="button" class="rv-btn rv-btn-outline rv-guide-e-btn-cancel rv-guide-btn-cancel">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
        <div class="rv-guide-e-footer-right rv-guide-service-footer-right">
            <button type="submit" class="rv-btn rv-btn-primary rv-guide-e-btn-save" id="d_btn_save_delivery">
                <i class="fas fa-save"></i> Guardar delivery
            </button>
        </div>
    </div>
</div>
