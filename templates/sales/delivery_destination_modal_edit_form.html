<div class="modal-dialog modal-md modal-dialog-scrollable"
     data-district-label="{{ district_label }}">
    <div class="modal-content rv-modal">
        <div class="modal-header">
            <div>
                <h5 class="modal-title"><i class="fas fa-pen"></i> Editar destino de reparto</h5>
                <p class="rv-modal-subtitle mb-0">{{ destination.name }}</p>
            </div>
            <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <form id="delivery-destination-edit-modal-form"
              data-action="{% url 'sales:save_delivery_destination_edit' destination.id %}">
            {% csrf_token %}
            <div class="modal-body">
                <h6 class="rv-section-label">Datos del destino</h6>
                <div class="rv-form-grid">
                    <div class="rv-form-group rv-form-group-full rv-form-group-required">
                        <label for="{{ form.name.id_for_label }}">{{ form.name.label }}</label>
                        {{ form.name }}
                    </div>
                    <div class="rv-form-group rv-form-group-full rv-form-group-required">
                        <label for="{{ form.district.id_for_label }}">{{ form.district.label }}</label>
                        {{ form.district }}
                        <small class="rv-field-hint">Escriba al menos 2 caracteres para buscar</small>
                    </div>
                    <div class="rv-form-group d-flex flex-column justify-content-end">
                        <label class="d-flex align-items-center justify-content-between mb-0">
                            <span>Estado</span>
                            <span class="d-flex align-items-center gap-2">
                                {{ form.is_enabled }}
                                <span class="text-muted small">Activo</span>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="rv-btn rv-btn-outline" data-dismiss="modal">Cancelar</button>
                <button type="submit" class="rv-btn rv-btn-success">
                    <i class="fas fa-save"></i> Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>
