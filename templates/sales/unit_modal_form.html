<div class="modal-dialog modal-md modal-dialog-scrollable">
    <div class="modal-content rv-modal">
        <div class="modal-header">
            <div>
                <h5 class="modal-title"><i class="fas fa-ruler-combined"></i> Nueva unidad</h5>
                <p class="rv-modal-subtitle mb-0">Registre una unidad de medida para encomiendas</p>
            </div>
            <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <form id="unit-modal-form">
            {% csrf_token %}
            <div class="modal-body">
                <div class="rv-modal-hint">
                    <i class="fas fa-info-circle"></i>
                    El <strong>código</strong> se usa en comprobantes; la <strong>descripción</strong> se muestra al emitir guías.
                </div>

                <h6 class="rv-section-label">Datos de la unidad</h6>
                <div class="rv-form-grid">
                    <div class="rv-form-group rv-form-group-required">
                        <label for="{{ form.name.id_for_label }}">{{ form.name.label }}</label>
                        {{ form.name }}
                        <small class="rv-field-hint">Máx. 5 caracteres</small>
                    </div>
                    <div class="rv-form-group d-flex flex-column justify-content-end">
                        <label class="d-flex align-items-center justify-content-between mb-0">
                            <span>Estado</span>
                            <span class="d-flex align-items-center gap-2">
                                {{ form.is_enabled }}
                                <span class="text-muted small">Activa</span>
                            </span>
                        </label>
                    </div>
                    <div class="rv-form-group rv-form-group-full">
                        <label for="{{ form.description.id_for_label }}">{{ form.description.label }}</label>
                        {{ form.description }}
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="rv-btn rv-btn-outline" data-dismiss="modal">Cancelar</button>
                <button type="submit" class="rv-btn rv-btn-success">
                    <i class="fas fa-save"></i> Guardar unidad
                </button>
            </div>
        </form>
    </div>
</div>
