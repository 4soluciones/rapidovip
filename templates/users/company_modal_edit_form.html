<div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content rv-modal">
        <div class="modal-header">
            <div>
                <h5 class="modal-title"><i class="fas fa-pen"></i> Editar empresa</h5>
                <p class="rv-modal-subtitle mb-0">{{ company.business_name }}</p>
            </div>
            <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <form id="company-edit-modal-form"
              data-action="{% url 'users:save_company_edit' company.id %}">
            {% csrf_token %}
            <div class="modal-body">
                <h6 class="rv-section-label">Datos de la empresa</h6>
                <div class="rv-form-grid">
                    <div class="rv-form-group rv-form-group-full">
                        <label>{{ form.business_name.label }}</label>
                        {{ form.business_name }}
                    </div>
                    <div class="rv-form-group">
                        <label>{{ form.short_name.label }}</label>
                        {{ form.short_name }}
                    </div>
                    <div class="rv-form-group">
                        <label>{{ form.ruc.label }}</label>
                        {{ form.ruc }}
                    </div>
                    <div class="rv-form-group">
                        <label>{{ form.phone.label }}</label>
                        {{ form.phone }}
                    </div>
                    <div class="rv-form-group rv-form-group-full">
                        <label>{{ form.address.label }}</label>
                        {{ form.address }}
                    </div>
                    <div class="rv-form-group">
                        <label class="d-flex align-items-center gap-2">
                            {{ form.is_enabled }}
                            <span>{{ form.is_enabled.label }}</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="rv-btn rv-btn-outline" data-dismiss="modal">Cancelar</button>
                <button type="submit" class="rv-btn rv-btn-success">
                    <i class="fas fa-save"></i> Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>
